</head>
<body>

<div id="masthead"></div>
<main id="app" class="container">
  <div class="mm-shell-empty">Loading issue&hellip;</div>
</main>

<script>
(function () {
  'use strict';

  // Render masthead immediately so the shell is legible even if the page
  // module fails to import. Date values are best-effort until the page
  // fetches real issue metadata and re-renders via MMComponents.renderMasthead.
  function bootMasthead() {
    var route = (location.pathname.replace(/^\//, '').split('/')[0]) || 'home';
    var mastCtx = { active: route };
    var host = document.getElementById('masthead');
    if (host) host.innerHTML = MMComponents.renderMasthead(mastCtx);
  }

  async function bootPage() {
    var route = (location.pathname.replace(/^\//, '').split('/')[0]) || 'home';
    var app = document.getElementById('app');
    try {
      var mod = await import('/static/v6/js/pages/' + route + '.js?v={{CACHEBUST}}');
      if (mod && typeof mod.mount === 'function') {
        mod.mount(app);
      } else {
        MMComponents.renderError(app, 'Page module for "' + route + '" did not export mount().');
      }
    } catch (e) {
      // Plan 04-08 add page modules; until then the shell itself is the deliverable.
      app.innerHTML =
        '<div class="mm-shell-empty">' +
          'Page &ldquo;' + MMUtils.escapeHtml(route) + '&rdquo; not yet implemented.' +
        '</div>';
    }
  }

  function boot() {
    bootMasthead();
    bootPage();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>

</body>
</html>
