<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Mahon — Mobile</title>
<meta name="description" content="Max Mahon — Thai stock analyst, Niwes Dividend-First style.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Serif+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/v6/shared/tokens.css?v={{CACHEBUST}}">
<link rel="stylesheet" href="/static/v6/shared/base.css?v={{CACHEBUST}}">
<link rel="stylesheet" href="/static/v6/shared/mobile.css?v={{CACHEBUST}}">
<link rel="stylesheet" href="/static/v6/css/components.css?v={{CACHEBUST}}">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0"></script>
<script src="/static/v6/js/device.js?v={{CACHEBUST}}"></script>
<script src="/static/v6/js/utils.js?v={{CACHEBUST}}"></script>
<script src="/static/v6/js/components.js?v={{CACHEBUST}}"></script>
<script src="/static/v6/js/supabase-client.js?v={{CACHEBUST}}"></script>
<script src="/static/v6/js/api.js?v={{CACHEBUST}}"></script>
</head>
<body>

<div id="masthead"></div>
<main id="app" class="container">
  <div class="mm-shell-empty">Loading issue&hellip;</div>
</main>
<div id="mobile-nav-host"></div>

<script>
(function () {
  'use strict';

  function routeFromPath() {
    var p = location.pathname || '/m';
    if (p === '/m' || p === '/mobile' || p === '/m/' || p === '/mobile/') return 'home';
    var stripped = p.replace(/^\/m(obile)?\//, '');
    var first = stripped.split('/')[0];
    return first || 'home';
  }

  // Auth guard — wait for Supabase, check session, fetch /api/me.
  async function authGuard() {
    if (location.pathname === '/m/login') return true;

    for (var i = 0; i < 20; i++) {
      if (window.MMSupabase) break;
      await new Promise(function (r) { setTimeout(r, 50); });
    }
    if (!window.MMSupabase) {
      document.getElementById('app').innerHTML =
        '<div class="mm-shell-empty">Supabase failed to load — refresh page</div>';
      return false;
    }

    var token = await window.MMSupabase.getAccessToken();
    if (!token) {
      location.href = '/m/login';
      return false;
    }

    try {
      var r = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (r.status === 403) {
        await window.MMSupabase.signOut();
        return false;
      }
      if (!r.ok) {
        document.getElementById('app').innerHTML =
          '<div class="mm-shell-empty">Auth check failed (' + r.status + ') — refresh page</div>';
        return false;
      }
      window.__MM_ME = await r.json();
      return true;
    } catch (e) {
      document.getElementById('app').innerHTML =
        '<div class="mm-shell-empty">Network error — refresh page</div>';
      return false;
    }
  }

  function bootMasthead() {
    var route = routeFromPath();
    if (location.pathname === '/m/login') return;
    var host = document.getElementById('masthead');
    if (host) host.innerHTML = MMComponents.renderMobileMastHead(window.__MM_ME, _pageTitleFor(route));
  }

  function _pageTitleFor(route) {
    if (route === 'home' || route === 'latest-scan') return 'Latest Scan';
    if (route === 'watchlist') return 'Watchlist';
    if (route === 'portfolio') return 'จัดพอร์ต';
    if (route === 'settings') return 'Settings';
    if (route === 'report') return 'Report';
    return 'Max Mahon';
  }

  function bootMobileNav() {
    if (location.pathname === '/m/login') return; // login page = no nav
    var host = document.getElementById('mobile-nav-host');
    if (!host) return;
    var tabKey = routeFromPath();
    var mappedActive = ({
      home: 'home', watchlist: 'saved', saved: 'saved',
      'latest-scan': 'home', portfolio: 'portfolio', settings: 'settings'
    })[tabKey] || 'home';
    host.innerHTML = MMComponents.renderMobileNav(mappedActive);
  }

  async function bootPage() {
    var route = routeFromPath();
    var app = document.getElementById('app');
    try {
      var mod = await import('/static/v6/js/pages/' + route + '.mobile.js?v={{CACHEBUST}}');
      if (mod && typeof mod.mount === 'function') {
        mod.mount(app);
      } else {
        MMComponents.renderError(app, 'Page module for "' + route + '" did not export mount().');
      }
    } catch (e) {
      app.innerHTML =
        '<div class="mm-shell-empty">' +
          'Page &ldquo;' + MMUtils.escapeHtml(route) + '&rdquo; not yet implemented.' +
        '</div>';
    }
  }

  async function boot() {
    var ok = await authGuard();
    if (!ok) return;
    bootMasthead();
    bootMobileNav();
    bootPage();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>

</body>
</html>
