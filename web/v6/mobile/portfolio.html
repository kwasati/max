<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Mahon — Mobile</title>
<meta name="description" content="Max Mahon — Real holdings + simulated allocation (mobile), Niwes Dividend-First.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Serif+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/v6/shared/tokens.css?v={{CACHEBUST}}">
<link rel="stylesheet" href="/static/v6/shared/base.css?v={{CACHEBUST}}">
<link rel="stylesheet" href="/static/v6/shared/mobile.css?v={{CACHEBUST}}">
<link rel="stylesheet" href="/static/v6/css/components.css?v={{CACHEBUST}}">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="/static/v6/js/device.js?v={{CACHEBUST}}"></script>
<script src="/static/v6/js/utils.js?v={{CACHEBUST}}"></script>
<script src="/static/v6/js/components.js?v={{CACHEBUST}}"></script>
<script src="/static/v6/js/api.js?v={{CACHEBUST}}"></script>
</head>
<body>

<div id="masthead"></div>
<main id="app" class="container">
  <div class="mm-shell-empty">Loading issue&hellip;</div>
</main>
<div id="mobile-nav-host"></div>

<script>
(function () {
  'use strict';

  function routeFromPath() {
    var p = location.pathname || '/m';
    if (p === '/m' || p === '/mobile' || p === '/m/' || p === '/mobile/') return 'home';
    var stripped = p.replace(/^\/m(obile)?\//, '');
    var first = stripped.split('/')[0];
    return first || 'home';
  }

  function bootMasthead() {
    var mastCtx = { active: routeFromPath() };
    var host = document.getElementById('masthead');
    if (host) host.innerHTML = MMComponents.renderMasthead(mastCtx);
  }

  function bootMobileNav() {
    var host = document.getElementById('mobile-nav-host');
    if (!host) return;
    var tabKey = routeFromPath();
    var mappedActive = ({
      home: 'home', watchlist: 'saved', saved: 'saved',
      portfolio: 'portfolio', 'portfolio-builder': 'builder', builder: 'builder', settings: 'settings'
    })[tabKey] || 'home';
    host.innerHTML = MMComponents.renderMobileNav(mappedActive);
  }

  async function bootPage() {
    var route = routeFromPath();
    var app = document.getElementById('app');
    try {
      var mod = await import('/static/v6/js/pages/' + route + '.mobile.js?v={{CACHEBUST}}');
      if (mod && typeof mod.mount === 'function') {
        mod.mount(app);
      } else {
        MMComponents.renderError(app, 'Page module for "' + route + '" did not export mount().');
      }
    } catch (e) {
      app.innerHTML =
        '<div class="mm-shell-empty">' +
          'Page &ldquo;' + MMUtils.escapeHtml(route) + '&rdquo; not yet implemented.' +
        '</div>';
    }
  }

  function boot() {
    bootMasthead();
    bootMobileNav();
    bootPage();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>

</body>
</html>
